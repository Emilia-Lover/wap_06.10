<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강 카페 메뉴판</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="name">
            <h1>강 카페</h1>
            <p>커피 뿐만 아니라 다양한 메뉴들이 있는 이색 카페</p>
        </div>
    </header>

    <main id="menu" class="menu-section">
        <h2>이색 메뉴</h2>

        <!-- 전체 메뉴를 감싸는 그리드 컨테이너 -->
        <div class="menu-item">
        
            <!-- 메뉴 1 -->
            <div class="card-wrap">
                <figure class="card">
                    <img src="햄치즈.jpg" alt="햄 치즈 토스트">
                    <figcaption class="info-box">
                        <h3 class="menu-title">
                            <span class="title-txt">햄 치즈 토스트</span>
                            <strong class="menu-price">4,500원</strong>
                        </h3>
                        <p class="menu-desc">고소한 치즈와 짭조름한 햄이 어우러진 대박 인기 토스트</p>
                    </figcaption>
                </figure>
            </div>

            <!-- 메뉴 2 -->
            <div class="card-wrap">
                <figure class="card">
                    <img src="나폴리탄.jpg" alt="나폴리탄">
                    <figcaption class="info-box">
                        <h3 class="menu-title">
                            <span class="title-txt">나폴리탄</span>
                            <strong class="menu-price">5,500원</strong>
                        </h3>
                        <p class="menu-desc">신선한 재료로 만든 새콤하고 맛있는 나폴리탄</p>
                    </figcaption>
                </figure>
            </div>

            <!-- 메뉴 3 -->
            <div class="card-wrap">
                <figure class="card">
                    <img src="로제.jpg" alt="로제떡볶이">
                    <figcaption class="info-box">
                        <h3 class="menu-title">
                            <span class="title-txt">로제떡볶이</span>
                            <strong class="menu-price">7,000원</strong>
                        </h3>
                        <p class="menu-desc">쫀득한 떡과 로제 소스가 어우러진 떡볶이</p>
                    </figcaption>
                </figure>
            </div>

            <!-- 메뉴 4 -->
            <div class="card-wrap">
                <figure class="card">
                    <img src="크로플.jpg" alt="크로플">
                    <figcaption class="info-box">
                        <h3 class="menu-title">
                            <span class="title-txt">크로플</span>
                            <strong class="menu-price">6,500원</strong>
                        </h3>
                        <p class="menu-desc">시원한 아이스림과 바삭 부드러운 크로플의 환상적인 조합</p>
                    </figcaption>
                </figure>
            </div>

            <!-- 메뉴 5 -->
            <div class="card-wrap">
                <figure class="card">
                    <img src="망고빙수.jpg" alt="망고빙수">
                    <figcaption class="info-box">
                        <h3 class="menu-title">
                            <span class="title-txt">망고빙수</span>
                            <strong class="menu-price">8,000원</strong>
                        </h3>
                        <p class="menu-desc">더위를 시원하게 날려줄 달콤 상큼한 망고빙수</p>
                    </figcaption>
                </figure>
            </div>

            <!-- 메뉴 6 -->
            <div class="card-wrap">
                <figure class="card">
                    <img src="딸기케이크.jpg" alt="딸기케이크">
                    <figcaption class="info-box">
                        <h3 class="menu-title">
                            <span class="title-txt">생크림 딸기케이크</span>
                            <strong class="menu-price">6,500원</strong>
                        </h3>
                        <p class="menu-desc">신선한 딸기와 부드러운 크림이 어우러진 딸기케이크</p>
                    </figcaption>
                </figure>
            </div>

            <!-- 메뉴 7 -->
            <div class="card-wrap">
                <figure class="card">
                    <img src="돼지국밥.jpg" alt="돼지국밥">
                    <figcaption class="info-box">
                        <h3 class="menu-title">
                            <span class="title-txt">돼지국밥</span>
                            <strong class="menu-price">9,000원</strong>
                        </h3>
                        <p class="menu-desc">카페에 이런게 왜? 라고싶을 정도의 이색 든든 한끼 식사</p>
                    </figcaption>
                </figure>
            </div>

            <!-- 메뉴 8 -->
            <div class="card-wrap">
                <figure class="card">
                    <img src="스다치.jpg" alt="스다치소바">
                    <figcaption class="info-box">
                        <h3 class="menu-title">
                            <span class="title-txt">스다치 소바</span>
                            <strong class="menu-price">9,000원</strong>
                        </h3>
                        <p class="menu-desc">카페에 이런게 왜? 두번째 메뉴! 상큼한 청귤과 냉모밀의 조화 일본의 대표적인 면 요리 중 하나인 스다치 소바</p>
                    </figcaption>
                </figure>
            </div>

        </div>
    </main>

    <footer>
      <p>&copy; 2026 My Gallery. HTML/CSS Practice.</p>
    </footer>

</body>
</html>
